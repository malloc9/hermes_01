name: Deploy to boxd.sh VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          # Copy the entire application to the VM
          scp -o StrictHostKeyChecking=no -i private_key.pem -r . $SSH_USER@$SSH_HOST:/home/boxd/hermes_01
          # SSH into the VM and update the application
          ssh -o StrictHostKeyChecking=no -i private_key.pem $SSH_USER@$SSH_HOST << 'EOF'
            cd /home/boxd/hermes_01
            # Install pm2 globally if not installed
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            # Install dependencies
            npm install
            cd client
              npm install
              npm run build
            cd ..
            # Restart the PM2 process or start if not exists
            if pm2 list | grep -q hermes_01; then
              pm2 restart hermes_01
            else
              pm2 start server.js --name hermes_01
            fi
            pm2 save
          EOF